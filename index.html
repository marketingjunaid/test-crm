<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/test-crm/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OrgOS" />
    <title>OrgOS</title>
    <script>
      // Restore path encoded by 404.html redirect
      (function() {
        var l = window.location;
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&');
          var path = params[0].slice(2); // "/chat" (already has leading slash)
          var query = params[1] ? '?' + decodeURIComponent(params[1].slice(2)) : '';
          var hash = l.hash;
          history.replaceState(null, null, l.pathname.slice(0, -1) + path + query + hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/test-crm/sw.js');
        });
      }
    </script>
  </body>
</html>
